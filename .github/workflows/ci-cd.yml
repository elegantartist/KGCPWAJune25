name: Keep Going Care CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  POSTGRES_VERSION: '14'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kgc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup test environment
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/kgc_test" >> .env
        echo "NODE_ENV=test" >> .env
        echo "SESSION_SECRET=test-session-secret-for-ci" >> .env

    - name: Run database setup
      run: npm run db:push

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run type-check

    - name: Run tests
      run: npm run test

    - name: Build application
      run: npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=high

  healthcare-compliance:
    name: Healthcare Compliance Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check healthcare data anonymization
      run: |
        echo "Checking for healthcare data protection..."
        grep -r "anonymize" server/services/ || echo "Warning: Ensure patient data anonymization"

    - name: Verify session timeout implementation
      run: |
        echo "Checking session timeout configuration..."
        grep -r "SESSION_TIMEOUT" server/ || echo "Warning: Verify session timeout implementation"

    - name: Check emergency detection
      run: |
        echo "Checking emergency detection systems..."
        grep -r "emergency" server/ai/ || echo "Warning: Verify emergency detection implementation"

  deploy-staging:
    name: Deploy to Staging
    needs: [test, security, healthcare-compliance]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build for staging
      run: npm run build

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        
  deploy-production:
    name: Deploy to Production
    needs: [test, security, healthcare-compliance]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build for production
      run: npm run build

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."